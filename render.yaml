services:
  - type: web
    name: watchluxurymiami-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FACEBOOK_PAGE_ACCESS_TOKEN
        sync: false
      - key: FACEBOOK_VERIFY_TOKEN
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: FACEBOOK_PAGE_ID
        sync: false
      - key: BUSINESS_NAME
        value: Watch Luxury Miami
      - key: OWNER_NAME
        value: Yeremi
      - key: BOT_NAME
        value: Asistente
      - key: TIMEZONE
        value: America/New_York
      - key: PORT
        value: 8000
      - key: DEBUG
        value: "False"
